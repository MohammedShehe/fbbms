<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>FBBMS | Verify Identity</title>

<link rel="icon" href="assets/logo.svg" type="image/svg+xml">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/variables.css">
<link rel="stylesheet" href="css/components.css">
<link rel="stylesheet" href="css/login.css">
</head>
<body>

<div class="auth-shell">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <div class="auth-card" id="otpCard">

    <div id="otpStep">
      <div class="otp-envelope"><i class="bi bi-shield-lock"></i></div>
      <h1 class="auth-title">Verify it's you</h1>
      <p class="auth-subtitle">A 6-digit code was generated for<br><b id="otpTargetEmail" class="mono">manager@fourbrothers.online</b></p>

      <div class="auth-error" id="otpError">
        <i class="bi bi-exclamation-circle"></i>
        <span id="otpErrorText">Incorrect code.</span>
      </div>

      <div class="otp-inputs" id="otpInputs">
        <input type="text" inputmode="numeric" maxlength="1">
        <input type="text" inputmode="numeric" maxlength="1">
        <input type="text" inputmode="numeric" maxlength="1">
        <input type="text" inputmode="numeric" maxlength="1">
        <input type="text" inputmode="numeric" maxlength="1">
        <input type="text" inputmode="numeric" maxlength="1">
      </div>

      <div class="otp-timer"><i class="bi bi-clock-history"></i> Code expires in <span id="otpCountdown">05:00</span></div>

      <button class="fb-btn" id="otpVerifyBtn" style="margin-top:14px;">
        <span class="spinner"></span>
        <span class="btn-text">Verify &amp; Continue</span>
      </button>

      <p class="otp-resend" style="margin-top:16px;">
        Didn't get a code?
        <button id="otpResendBtn">Resend code</button>
      </p>

      <div class="demo-creds">
        <i class="bi bi-info-circle"></i> <b>Demo mode</b> &mdash; no real email is sent. Your live code is
        <span class="mono" id="otpDemoCode" style="color:var(--sports); font-weight:700;">------</span>
      </div>
    </div>

    <div id="otpSuccessStep" style="display:none;">
      <div class="otp-success">
        <div class="check-ring"><i class="bi bi-check-lg"></i></div>
        <h1 class="auth-title" style="margin-top:0;">Identity verified</h1>
        <p class="auth-subtitle">Redirecting you to your dashboard&hellip;</p>
      </div>
    </div>

    <p class="auth-footer-note"><a href="index.html"><i class="bi bi-arrow-left"></i> Back to sign in</a></p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/utils.js"></script>
<script src="js/data.js"></script>
<script src="js/otp.js"></script>
</body>
</html>
